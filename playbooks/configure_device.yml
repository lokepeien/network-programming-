---
- name: Configure CSR1000v device (IP, user, banner, description, static route)
  hosts: csr1kv
  gather_facts: no

  tasks:
    - name: Configure IP address on Loopback100
      cisco.ios.ios_config:
        lines:
          - ip address 10.10.10.1 255.255.255.0
        parents: interface Loopback100

    - name: Configure interface description on Loopback100
      cisco.ios.ios_config:
        lines:
          - description Configured-via-Ansible-NetworkProgramming-Assignment
        parents: interface Loopback100

    - name: Configure user account
      cisco.ios.ios_config:
        lines:
          - username netadmin privilege 15 secret Cisco12345

    - name: Configure banner message
      cisco.ios.ios_banner:
        banner: motd
        text: |
          Authorized access only.
          Configured automatically via Ansible - Network Programming Assignment.
        state: present

    - name: Configure static route
      cisco.ios.ios_config:
        lines:
          - ip route 10.20.20.0 255.255.255.0 192.168.122.1
